<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moderator Login - EconGame</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 450px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        h1 {
            color: #f5576c;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #333;
            margin-bottom: 8px;
            font-weight: 600;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #f5576c;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(245, 87, 108, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .message {
            margin-bottom: 20px;
            padding: 12px 15px;
            border-radius: 8px;
            font-size: 0.95rem;
            display: none;
        }

        .message.error {
            background: #fee;
            color: #c33;
            border: 1px solid #fcc;
        }

        .message.success {
            background: #efe;
            color: #3c3;
            border: 1px solid #cfc;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: #f5576c;
            text-decoration: none;
            font-weight: 600;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        .info-box {
            background: rgba(245, 87, 108, 0.1);
            border: 2px solid rgba(245, 87, 108, 0.3);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            color: #333;
        }

        .info-box strong {
            color: #f5576c;
        }

        .info-box code {
            background: rgba(0,0,0,0.05);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="icon">🛡️</div>
            <h1>Moderator Login</h1>
            <p class="subtitle">Enter your admin key to access moderation tools</p>
        </div>

        <div class="info-box">
            <strong>ℹ️ For Testing:</strong><br>
            Use any valid admin key from the console output, or check the <code>game_data/admin_keys.json</code> file for generated keys.
        </div>

        <div id="message" class="message"></div>

        <form id="modLoginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="username">Username (Optional)</label>
                <input type="text" id="username" name="username" placeholder="Your username for tracking">
            </div>

            <div class="form-group">
                <label for="adminKey">Admin Key *</label>
                <input type="password" id="adminKey" name="adminKey" required placeholder="Enter your admin key">
            </div>

            <button type="submit" class="btn">🔓 Login as Moderator</button>
        </form>

        <div class="back-link">
            <a href="/">← Back to Home</a>
        </div>
    </div>

    <script>
        async function handleLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value.trim() || 'Moderator';
            const adminKey = document.getElementById('adminKey').value.trim();
            
            const messageDiv = document.getElementById('message');
            
            try {
                const response = await fetch('/moderator-login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, admin_key: adminKey })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    messageDiv.className = 'message success';
                    messageDiv.textContent = data.message;
                    messageDiv.style.display = 'block';
                    
                    setTimeout(() => {
                        window.location.href = '/game';
                    }, 500);
                } else {
                    messageDiv.className = 'message error';
                    messageDiv.textContent = data.error || 'Invalid admin key';
                    messageDiv.style.display = 'block';
                }
            } catch (error) {
                messageDiv.className = 'message error';
                messageDiv.textContent = 'Login failed. Please try again.';
                messageDiv.style.display = 'block';
            }
        }
    </script>
</body>
</html>
