<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner Login - EconGame</title>
    <link rel="icon" type="image/png" href="{{ favicon_url }}">
    <link rel="stylesheet" href="/static/auth.css?v={{ static_asset_version }}">
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--c-bg-start) 0%, var(--c-bg-end) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            padding: 40px;
            border-radius: 15px;
            box-shadow: var(--panel-shadow);
            width: 90%;
            max-width: 420px;
            color: var(--c-ink);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .icon { font-size: 3rem; margin-bottom: 10px; }

        h1 { color: var(--c-accent); font-size: 1.8rem; margin-bottom: 6px; }

        .subtitle { color: rgba(var(--rgb-ink), 0.68); font-size: 0.9rem; }

        .form-group { margin-bottom: 20px; }

        label { display: block; color: rgba(var(--rgb-ink), 0.88); margin-bottom: 8px; font-weight: 600; }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px 15px;
            background: rgba(var(--rgb-silver), 0.65);
            border: 1px solid rgba(var(--rgb-ink), 0.18);
            border-radius: 8px;
            font-size: 1rem;
            color: var(--c-ink);
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: rgba(var(--rgb-accent), 0.6);
            box-shadow: var(--focus-shadow);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: var(--grad-accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(var(--rgb-accent), 0.35);
        }

        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .message {
            margin-bottom: 20px;
            padding: 12px 15px;
            border-radius: 8px;
            font-size: 0.95rem;
            display: none;
        }

        .message.error { background: rgba(var(--rgb-accent), 0.14); color: #9f1239; border: 1px solid rgba(var(--rgb-accent), 0.45); }
        .message.success { background: rgba(var(--rgb-primary), 0.14); color: var(--c-pine); border: 1px solid rgba(var(--rgb-primary), 0.35); }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: var(--c-purple);
            text-decoration: none;
            font-size: 0.9rem;
        }

        .back-link a:hover { text-decoration: underline; }

        .countdown {
            margin-top: 8px;
            font-size: 0.85rem;
            opacity: 0.85;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="icon">👑</div>
            <h1>Owner Access</h1>
            <p class="subtitle">Restricted — authorized personnel only</p>
        </div>

        <div id="message" class="message"></div>

        <form id="ownerLoginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autocomplete="off">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required autocomplete="off">
            </div>
            
            <div class="form-group" style="display: flex; align-items: center; margin-bottom: 10px;">
                <input type="checkbox" id="remember_me" name="remember_me" style="width: auto; margin-right: 8px;">
                <label for="remember_me" style="margin: 0; font-weight: normal;">Remember me for 30 days</label>
            </div>
            
            <!-- Cloudflare Turnstile CAPTCHA -->
            <div class="form-group">
                <div class="cf-turnstile" data-sitekey="{{ turnstile_site_key }}" data-theme="light"></div>
                {% if turnstile_site_key == '1x00000000000000000000AA' %}
                <p style="font-size: 0.85em; color: #666; margin-top: 5px;">
                    ℹ️ Using demo key - Get your free Turnstile key at <a href="https://dash.cloudflare.com" target="_blank">Cloudflare Dashboard</a>
                </p>
                {% endif %}
            </div>
            
            <button type="submit" class="btn" id="loginBtn">🔐 Login as Owner</button>
        </form>

        <div class="back-link">
            <a href="/">← Back to Home</a>
        </div>
    </div>

    <script>
        async function handleLogin(event) {
            event.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const remember_me = document.getElementById('remember_me').checked;
            const messageDiv = document.getElementById('message');
            const loginBtn = document.getElementById('loginBtn');

            loginBtn.disabled = true;
            loginBtn.textContent = 'Authenticating...';

            try {
                const response = await fetch('/owner-login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, remember_me })
                });

                const data = await response.json();

                if (data.success) {
                    messageDiv.className = 'message success';
                    messageDiv.textContent = data.message;
                    messageDiv.style.display = 'block';
                    setTimeout(() => { window.location.href = '/owner-dashboard'; }, 800);
                } else {
                    startFailureRedirect(messageDiv, loginBtn);
                }
            } catch (error) {
                messageDiv.className = 'message error';
                messageDiv.textContent = 'Connection error. Please try again.';
                messageDiv.style.display = 'block';
                loginBtn.disabled = false;
                loginBtn.textContent = '🔐 Login as Owner';
            }
        }

        function startFailureRedirect(messageDiv, loginBtn) {
            let secondsRemaining = 7;
            loginBtn.disabled = true;
            loginBtn.textContent = '🥀 No Entry';
            messageDiv.className = 'message error';
            messageDiv.style.display = 'block';
            messageDiv.innerHTML = `Go away twin 🥀<div class="countdown">Redirecting to login in ${secondsRemaining}s...</div>`;

            const timer = setInterval(() => {
                secondsRemaining -= 1;
                if (secondsRemaining <= 0) {
                    clearInterval(timer);
                    window.location.href = '/login';
                    return;
                }

                messageDiv.innerHTML = `Go away twin 🥀<div class="countdown">Redirecting to login in ${secondsRemaining}s...</div>`;
            }, 1000);
        }
    </script>
</body>
</html>
