<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EconGame - Login</title>
    <link rel="icon" type="image/png" href="{{ favicon_url }}">
    <link rel="stylesheet" href="/static/auth.css?v={{ static_asset_version }}">
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--c-bg-start) 0%, var(--c-bg-end) 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .auth-container {
            background: var(--panel-bg);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 450px;
            width: 100%;
            border: 1px solid var(--panel-border);
            color: var(--c-ink);
        }
        
        h1 {
            text-align: center;
            color: rgba(var(--rgb-ink), 0.92);
            margin-bottom: 10px;
        }
        
        .subtitle {
            text-align: center;
            color: rgba(var(--rgb-ink), 0.68);
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: rgba(var(--rgb-ink), 0.88);
            font-weight: 600;
        }
        
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(var(--rgb-ink), 0.18);
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s ease;
            background: rgba(var(--rgb-silver), 0.65);
            color: var(--c-ink);
        }
        
        input:focus {
            outline: none;
            border-color: rgba(var(--rgb-accent), 0.6);
            box-shadow: var(--focus-shadow);
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            background: var(--grad-primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .link-text {
            text-align: center;
            margin-top: 20px;
            color: rgba(var(--rgb-ink), 0.68);
        }
        
        .link-text a {
            color: var(--c-purple);
            text-decoration: none;
            font-weight: 600;
        }
        
        .link-text a:hover {
            text-decoration: underline;
        }
        
        .error-message {
            background: rgba(var(--rgb-accent), 0.14);
            border: 1px solid rgba(var(--rgb-accent), 0.45);
            color: #9f1239;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .success-message {
            background: #efe;
            border: 1px solid #cfc;
            color: #3c3;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        #message {
            display: none;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <h1>💰 EconGame</h1>
        <p class="subtitle">Login to your account</p>
        
        <div id="message"></div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            
            <div class="form-group" style="display: flex; align-items: center; margin-bottom: 10px;">
                <input type="checkbox" id="remember_me" name="remember_me" style="width: auto; margin-right: 8px;">
                <label for="remember_me" style="margin: 0; font-weight: normal;">Remember me for 30 days</label>
            </div>
            
            <!-- Cloudflare Turnstile CAPTCHA -->
            <div class="form-group">
                <div class="cf-turnstile" data-sitekey="{{ turnstile_site_key }}" data-theme="light"></div>
                {% if turnstile_site_key == '1x00000000000000000000AA' %}
                <p style="font-size: 0.85em; color: #666; margin-top: 5px;">
                    ℹ️ Using demo key - Get your free Turnstile key at <a href="https://dash.cloudflare.com" target="_blank">Cloudflare Dashboard</a>
                </p>
                {% endif %}
            </div>
            
            <button type="submit" class="btn" id="loginBtn">Login</button>
        </form>
        
        <p class="link-text">
            Don't have an account? <a href="/register">Register here</a>
        </p>
        <p class="link-text">
            <a href="/forgot-password">Forgot your password?</a>
        </p>
        <p class="link-text back-link">
            <a href="/">← Back to Home</a>
        </p>
    </div>
    
    <script>
        const form = document.getElementById('loginForm');
        const messageDiv = document.getElementById('message');
        const loginBtn = document.getElementById('loginBtn');
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const remember_me = document.getElementById('remember_me').checked;
            
            loginBtn.disabled = true;
            loginBtn.textContent = 'Logging in...';
            
            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password, remember_me })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    messageDiv.className = 'success-message';
                    messageDiv.textContent = data.message;
                    messageDiv.style.display = 'block';
                    
                    setTimeout(() => {
                        window.location.href = '/game';
                    }, 1000);
                } else {
                    messageDiv.className = 'error-message';
                    messageDiv.textContent = data.error;
                    messageDiv.style.display = 'block';
                    
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Login';
                }
            } catch (error) {
                messageDiv.className = 'error-message';
                messageDiv.textContent = 'Connection error. Please try again.';
                messageDiv.style.display = 'block';
                
                loginBtn.disabled = false;
                loginBtn.textContent = 'Login';
            }
        });
    </script>
</body>
</html>
