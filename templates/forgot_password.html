<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - EconGame</title>
    <link rel="stylesheet" href="/static/auth.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .auth-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 450px;
            width: 100%;
        }
        h1 { text-align: center; color: #333; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #333; font-weight: 600; }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
        }
        input:focus { outline: none; border-color: #667eea; }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3); }
        .link-text { text-align: center; margin-top: 20px; color: #666; }
        .link-text a { color: #667eea; text-decoration: none; font-weight: 600; }
        .error-message, .success-message { padding: 12px; border-radius: 8px; margin-bottom: 20px; text-align: center; }
        .error-message { background: #fee; border: 1px solid #fcc; color: #c33; }
        .success-message { background: #efe; border: 1px solid #cfc; color: #3c3; }
        #message { display: none; }
        .info-box {
            background: #e3f2fd;
            border-left: 4px solid #2196F3;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
        }
        .reset-code-box {
            background: #fff3cd;
            border: 2px solid #ffc107;
            padding: 20px;
            border-radius: 8px;
            margin-top: 15px;
        }
        .reset-code {
            font-family: monospace;
            font-size: 1.2em;
            background: #fff;
            padding: 10px;
            border-radius: 6px;
            word-break: break-all;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <h1>🔐 Forgot Password</h1>
        <p class="subtitle">Enter your email to reset your password</p>
        
        <div id="message"></div>
        
        <div class="info-box">
            <strong>Note:</strong> In development mode, the reset code will be displayed here instead of being emailed.
        </div>
        
        <form id="forgotForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required>
            </div>
            
            <button type="submit" class="btn" id="submitBtn">Get Reset Code</button>
        </form>
        
        <div id="resetCodeDisplay" style="display: none;" class="reset-code-box">
            <strong>⚠️ Your Password Reset Code:</strong>
            <div class="reset-code" id="resetCode"></div>
            <p style="margin-top: 10px; font-size: 0.9em;">
                Save this code! Use it on the <a href="/reset-password">reset password page</a>.
            </p>
        </div>
        
        <p class="link-text">
            <a href="/login">Back to Login</a>
        </p>
    </div>
    
    <script>
        const form = document.getElementById('forgotForm');
        const messageDiv = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');
        const resetCodeDisplay = document.getElementById('resetCodeDisplay');
        const resetCodeElement = document.getElementById('resetCode');
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'Processing...';
            
            try {
                const response = await fetch('/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    messageDiv.className = 'success-message';
                    messageDiv.textContent = data.message;
                    messageDiv.style.display = 'block';
                    
                    // Show reset code if in development mode
                    if (data.reset_code) {
                        resetCodeDisplay.style.display = 'block';
                        resetCodeElement.textContent = data.reset_code;
                    }
                    
                    form.style.display = 'none';
                } else {
                    messageDiv.className = 'error-message';
                    messageDiv.textContent = data.error;
                    messageDiv.style.display = 'block';
                }
                
                submitBtn.disabled = false;
                submitBtn.textContent = 'Get Reset Code';
            } catch (error) {
                messageDiv.className = 'error-message';
                messageDiv.textContent = 'Connection error. Please try again.';
                messageDiv.style.display = 'block';
                
                submitBtn.disabled = false;
                submitBtn.textContent = 'Get Reset Code';
            }
        });
    </script>
</body>
</html>
