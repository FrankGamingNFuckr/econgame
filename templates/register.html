<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - EconGame</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .auth-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 450px;
            width: 100%;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }
        
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s ease;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .link-text {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }
        
        .link-text a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        
        .link-text a:hover {
            text-decoration: underline;
        }
        
        .error-message {
            background: #fee;
            border: 1px solid #fcc;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .success-message {
            background: #efe;
            border: 1px solid #cfc;
            color: #3c3;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        #message {
            display: none;
        }
        
        .requirements {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9em;
        }
        
        .requirements ul {
            margin-left: 20px;
            margin-top: 8px;
        }
        
        .requirements li {
            margin-bottom: 5px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <h1>💰 EconGame</h1>
        <p class="subtitle">Create your account</p>
        
        <div id="message"></div>
        
        <div class="requirements">
            <strong>Requirements:</strong>
            <ul>
                <li>Username: At least 3 characters</li>
                <li>Password: At least 6 characters</li>
                <li>Valid email address</li>
            </ul>
            <p style="margin-top:10px; color:#555;">
                Note: A verification email will be sent to your email address.
            </p>
        </div>
        
        <form id="registerForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required minlength="3">
            </div>
            
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required minlength="6">
            </div>
            
            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" required minlength="6">
            </div>
            
            <button type="submit" class="btn" id="registerBtn">Create Account</button>
        </form>
        
        <p class="link-text">
            Already have an account? <a href="/login">Login here</a>
        </p>
        <p class="link-text">
            <a href="#" id="resendVerificationLink">Resend verification email</a>
        </p>
    </div>
    
    <script>
        const form = document.getElementById('registerForm');
        const messageDiv = document.getElementById('message');
        const registerBtn = document.getElementById('registerBtn');
        const resendVerificationLink = document.getElementById('resendVerificationLink');
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm_password').value;
            
            // Validate passwords match
            if (password !== confirmPassword) {
                messageDiv.className = 'error-message';
                messageDiv.textContent = 'Passwords do not match!';
                messageDiv.style.display = 'block';
                return;
            }
            
            registerBtn.disabled = true;
            registerBtn.textContent = 'Creating account...';
            
            try {
                const response = await fetch('/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, email, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    messageDiv.className = 'success-message';
                    if (data.verification_link) {
                        messageDiv.innerHTML = `${data.message}<br><br><a href="${data.verification_link}" target="_blank" rel="noopener">Verify Email Now</a><br><small>After verification, you can log in.</small>`;
                    } else {
                        messageDiv.textContent = data.message + ' Redirecting to login...';
                    }
                    messageDiv.style.display = 'block';
                    
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 2000);
                } else {
                    messageDiv.className = 'error-message';
                    messageDiv.textContent = data.error;
                    messageDiv.style.display = 'block';
                    
                    registerBtn.disabled = false;
                    registerBtn.textContent = 'Create Account';
                }
            } catch (error) {
                messageDiv.className = 'error-message';
                messageDiv.textContent = 'Connection error. Please try again.';
                messageDiv.style.display = 'block';
                
                registerBtn.disabled = false;
                registerBtn.textContent = 'Create Account';
            }
        });

        resendVerificationLink.addEventListener('click', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const identifier = email || username;

            if (!identifier) {
                messageDiv.className = 'error-message';
                messageDiv.textContent = 'Enter your email (or username) first, then click resend.';
                messageDiv.style.display = 'block';
                return;
            }

            try {
                const response = await fetch('/resend-verification', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ identifier })
                });

                const data = await response.json();

                if (response.ok) {
                    messageDiv.className = 'success-message';
                    if (data.verification_link) {
                        messageDiv.innerHTML = `${data.message}<br><br><a href="${data.verification_link}" target="_blank" rel="noopener">Verify Email Now</a>`;
                    } else {
                        messageDiv.textContent = data.message;
                    }
                    messageDiv.style.display = 'block';
                } else {
                    messageDiv.className = 'error-message';
                    messageDiv.textContent = data.error || 'Failed to resend verification email.';
                    messageDiv.style.display = 'block';
                }
            } catch (error) {
                messageDiv.className = 'error-message';
                messageDiv.textContent = 'Connection error. Please try again.';
                messageDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
