<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Owner Dashboard</title>
  <style>
    body { font-family: Segoe UI, Arial; background:#f6f8fb; padding:20px; }
    table { width:100%; border-collapse:collapse; }
    th,td { padding:8px; border:1px solid #ddd; text-align:left; }
    button { padding:6px 10px; margin:0 4px; }
    .modal {
      display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45);
      align-items:center; justify-content:center; z-index:9999;
    }
    .modal.open { display:flex; }
    .modal-card {
      width:min(520px, 92vw); background:#fff; border-radius:10px; padding:16px;
      box-shadow:0 10px 35px rgba(0,0,0,0.25); position:relative;
    }
    .modal-close {
      position:absolute; right:10px; top:8px; border:none; background:transparent;
      font-size:24px; cursor:pointer; line-height:1;
    }
    .field { margin:12px 0; }
    .field input { width:100%; padding:10px; border:1px solid #ccc; border-radius:8px; }
    .error { color:#b42318; font-size:0.9em; min-height:20px; }
    .hint { color:#555; font-size:0.9em; }
  </style>
</head>
<body>
  <h1>Owner Dashboard</h1>
  <p>Manage admin keys (generate / toggle active). Assign to a valid username or leave blank for shared key.</p>
  <div>
    <button id="gen-key">Generate New Admin Key</button>
  </div>
  <h3>Existing Keys</h3>
  <div id="keys-container">Loading…</div>

  <div id="assign-modal" class="modal" aria-hidden="true">
    <div class="modal-card">
      <button class="modal-close" id="assign-close" title="Close">×</button>
      <h3 id="assign-title">Assign Key</h3>
      <p class="hint">Enter a valid username. Leave blank to make it shared (any moderator).</p>
      <div class="field">
        <input id="assign-username" type="text" list="username-suggestions" placeholder="Username (e.g., FrixxTVOwner)">
        <datalist id="username-suggestions"></datalist>
      </div>
      <div id="assign-error" class="error"></div>
      <div style="margin-top:10px;">
        <button id="assign-save">Save</button>
        <button id="assign-cancel">Cancel</button>
      </div>
    </div>
  </div>

<script>
let assignMode = 'generate';
let selectedKey = null;

function openAssignModal(mode, key, currentAssigned) {
  assignMode = mode;
  selectedKey = key || null;
  document.getElementById('assign-title').textContent = mode === 'generate' ? 'Generate & Assign Key' : `Reassign Key`;
  document.getElementById('assign-username').value = currentAssigned || '';
  document.getElementById('assign-error').textContent = '';
  document.getElementById('assign-modal').classList.add('open');
  loadUsernameSuggestions(document.getElementById('assign-username').value || '');
}

function closeAssignModal() {
  document.getElementById('assign-modal').classList.remove('open');
}

async function submitAssignModal() {
  const input = document.getElementById('assign-username');
  const errorNode = document.getElementById('assign-error');
  const assigned_username = input.value.trim().toLowerCase();

  errorNode.textContent = '';

  if (assigned_username && assigned_username.length < 3) {
    errorNode.textContent = 'Enter a valid username (at least 3 characters).';
    return;
  }

  if (assignMode === 'generate') {
    const description = assigned_username ? `Personal key for ${assigned_username}` : 'Generated by owner';
    const r = await fetch('/api/admin_keys/generate', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({assigned_username, description})
    });
    const j = await r.json();
    if (r.ok) {
      const who = j.assigned_username ? `Assigned to: ${j.assigned_username}` : 'Assigned to: any moderator';
      alert('New admin key created: ' + j.key + '\n' + who + '\nSaved to game_data/admin_keys.json');
      closeAssignModal();
      loadKeys();
      return;
    }
    errorNode.textContent = j.error || 'Failed to generate key.';
    return;
  }

  const r = await fetch('/api/admin_keys/reassign', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({key:selectedKey, assigned_username})
  });
  const j = await r.json();
  if (r.ok) {
    closeAssignModal();
    loadKeys();
    return;
  }
  errorNode.textContent = j.error || 'Failed to reassign key.';
}

async function loadUsernameSuggestions(query) {
  try {
    const res = await fetch('/api/usernames?query=' + encodeURIComponent(query || ''));
    const data = await res.json();
    const datalist = document.getElementById('username-suggestions');
    if (!datalist) return;
    datalist.innerHTML = (data.usernames || []).map(u => `<option value="${u}"></option>`).join('');
  } catch (_) {
    // Silently ignore suggestions load failures
  }
}

async function loadKeys(){
  const res = await fetch('/api/admin_keys');
  const data = await res.json();
  const keys = data.keys || {};
  const rows = Object.entries(keys).map(([k,v])=>{
    return `<tr>
      <td style="font-family:monospace">${k}</td>
      <td>${v.description||''}</td>
      <td>${v.created_at||''}</td>
      <td>${v.assigned_username||'Any moderator'}</td>
      <td>${v.last_used||''}</td>
      <td>${v.active? 'Active':'Disabled'}</td>
      <td>
        <button data-key="${k}" class="toggle">Toggle</button>
        <button data-key="${k}" data-assigned="${v.assigned_username||''}" class="reassign">Reassign</button>
      </td>
    </tr>`
  }).join('');
  document.getElementById('keys-container').innerHTML = `<table><thead><tr><th>Key</th><th>Description</th><th>Created</th><th>Assigned To</th><th>Last Used</th><th>Status</th><th>Actions</th></tr></thead><tbody>${rows}</tbody></table>`;
  document.querySelectorAll('.toggle').forEach(b=>b.addEventListener('click',async e=>{
    const key = e.target.dataset.key;
    const r = await fetch('/api/admin_keys/toggle',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({key})});
    const j = await r.json();
    if(r.ok) loadKeys(); else alert(j.error||'Failed');
  }));

  document.querySelectorAll('.reassign').forEach(b=>b.addEventListener('click', e=>{
    const key = e.target.dataset.key;
    const current = e.target.dataset.assigned || '';
    openAssignModal('reassign', key, current);
  }));
}

document.getElementById('gen-key').addEventListener('click', ()=> openAssignModal('generate', null, ''));
document.getElementById('assign-username').addEventListener('input', (e)=> loadUsernameSuggestions(e.target.value));
document.getElementById('assign-save').addEventListener('click', submitAssignModal);
document.getElementById('assign-cancel').addEventListener('click', closeAssignModal);
document.getElementById('assign-close').addEventListener('click', closeAssignModal);
document.getElementById('assign-modal').addEventListener('click', (e)=>{
  if (e.target.id === 'assign-modal') closeAssignModal();
});

loadKeys();
</script>
</body>
</html>
